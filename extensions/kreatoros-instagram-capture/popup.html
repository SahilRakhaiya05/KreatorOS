<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      background-color: #030712;
      color: #f3f4f6;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #1f2937;
      padding-bottom: 12px;
      margin-bottom: 16px;
    }
    .logo {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, #f43f5e, #ec4899);
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: 18px;
      color: #fff;
    }
    .title {
      font-weight: 800;
      font-size: 16px;
      letter-spacing: -0.025em;
    }
    .subtitle {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 1px;
    }
    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 14px;
    }
    .auth-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 10px;
      padding: 10px 0;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 9999px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge-error {
      background: rgba(239, 68, 68, 0.1);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    .badge-success {
      background: rgba(16, 185, 129, 0.1);
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }
    .profile-info {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      text-align: left;
    }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      background: #374151;
      display: grid;
      place-items: center;
      font-weight: 700;
      font-size: 14px;
      color: #fff;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      height: 40px;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #f3f4f6;
      color: #030712;
    }
    .btn-primary:hover {
      background: #e5e7eb;
    }
    .btn-secondary {
      background: #1f2937;
      color: #f3f4f6;
      border: 1px solid #374151;
    }
    .btn-secondary:hover {
      background: #374151;
    }
    .btn-action {
      background: linear-gradient(135deg, #f43f5e, #ec4899);
      color: #fff;
      margin-top: 6px;
      box-shadow: 0 4px 12px rgba(244, 63, 94, 0.2);
    }
    .btn-action:hover {
      opacity: 0.92;
    }
    .footer {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #6b7280;
      border-top: 1px solid #1f2937;
      padding-top: 10px;
      margin-top: 16px;
    }
    .footer a {
      color: #ec4899;
      text-decoration: none;
      font-weight: 600;
    }
    .footer a:hover {
      text-decoration: underline;
    }
    .recent-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #9ca3af;
      margin-bottom: 8px;
    }
    .recent-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      padding: 6px 0;
      border-bottom: 1px solid #1f2937;
    }
    .recent-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }
    .recent-img {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      object-fit: cover;
      background: #374151;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">K</div>
    <div>
      <div class="title">KreatorOS</div>
      <div class="subtitle">Instagram Swipe Engine</div>
    </div>
  </div>

  <div class="card">
    <div id="auth-loading" style="text-align: center; padding: 10px 0; color: #9ca3af;">
      Checking authorization status...
    </div>

    <!-- Signed Out State -->
    <div id="auth-signed-out" class="auth-state" style="display: none;">
      <span class="badge badge-error">Needs Auth</span>
      <p style="font-size: 13px; color: #9ca3af; margin: 4px 0 10px 0; line-height: 1.4;">
        Connect your account to save Instagram posts & reels directly to your database.
      </p>
      <button id="btn-login" class="btn btn-primary">Connect Account</button>
    </div>

    <!-- Signed In State -->
    <div id="auth-signed-in" class="auth-state" style="display: none;">
      <div class="profile-info">
        <div id="avatar" class="avatar">KO</div>
        <div style="min-width: 0; flex: 1;">
          <div id="username" style="font-weight: 700; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">Loading...</div>
          <div id="role-badge" style="font-size: 10px; color: #34d399; font-weight: 700; margin-top: 1px;">CREATOR</div>
        </div>
        <span class="badge badge-success">Connected</span>
      </div>
      <button id="btn-capture" class="btn btn-action">Save Active Post</button>
    </div>
  </div>

  <!-- Recent Captures -->
  <div id="recent-container" class="card" style="display: none;">
    <div class="recent-title">Recent Captures</div>
    <div id="recent-list">
      <!-- dynamically populated -->
    </div>
  </div>

  <div class="footer">
    <span>v1.0.0</span>
    <a id="link-library" href="#" target="_blank">View Library</a>
  </div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
